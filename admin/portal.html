<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code | NexaOps AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            const session = localStorage.getItem('nexa_session');
            if (!session) window.location.href = '/login.html';
        })();
    </script>
    <style>
        body {
            background-color: #000;
            color: #d1d1d1;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
        }
        #terminal {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .line { margin-bottom: 10px; line-height: 1.5; font-size: 13px; }
        .prompt { color: #d4ff00; font-weight: bold; margin-right: 10px; }
        .thought { color: #00bcd4; font-style: italic; }
        .tool { color: #ffeb3b; font-weight: bold; }
        .output { color: #e2e8f0; }
        .error { color: #ff5252; }
        .system { color: #757575; font-size: 11px; }
        
        #input-line { display: flex; align-items: flex-start; margin-top: 10px; }
        #prompt-input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            flex: 1;
            resize: none;
            padding: 0;
            caret-color: #d4ff00;
        }
        
        #artifacts-panel {
            width: 45%;
            background: #0a0a0a;
            border-left: 1px solid #222;
            display: none;
            flex-direction: column;
        }
        .artifact-header {
            padding: 10px 20px;
            background: #111;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .artifact-content { flex: 1; background: white; margin: 15px; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; }

        .loading-dots:after {
            content: '...';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body>

    <div id="terminal" onclick="focusInput()">
        <div class="line system">NexaOps AI [v2.4.0] - Claude Code Agentic Terminal</div>
        <div class="line system">Connected to OpenRouter (Model: anthropic/claude-3.5-sonnet)</div>
        <div class="line system">Type /help for available commands. Select an agent to begin.</div>
        <div id="history"></div>
        <div id="input-line">
            <span class="prompt" id="current-prompt">nexaops-ai ></span>
            <textarea id="prompt-input" rows="1" autofocus onkeydown="handleInput(event)"></textarea>
        </div>
    </div>

    <aside id="artifacts-panel">
        <div class="artifact-header">
            <span class="system mono text-[10px] uppercase font-bold tracking-widest">Visual_Artifact_Buffer</span>
            <button onclick="togglePanel()" class="text-gray-500 hover:text-white">✕</button>
        </div>
        <div class="artifact-content">
            <iframe id="preview-frame"></iframe>
        </div>
        <div class="p-4 flex gap-2">
            <button onclick="downloadArtifact()" class="bg-white/5 hover:bg-white/10 text-[10px] px-4 py-2 rounded font-bold">DOWNLOAD</button>
            <button onclick="openFull()" class="bg-[#d4ff00] text-black text-[10px] px-4 py-2 rounded font-bold">FULLSCREEN</button>
        </div>
    </aside>

    <script>
        const AGENTS = [
            { id: 'orch', name: 'orchestrator', emoji: '🎯', prompt: 'Eres el Coordinador de NexaOps. Tu misión es planificar y delegar tareas.' },
            { id: 'python', name: 'python-dev', emoji: '🐍', prompt: 'Eres experto en Python y Automatización.' },
            { id: 'frontend', name: 'frontend-dev', emoji: '🎨', prompt: 'Eres el diseñador web de NexaOps. Usa Tailwind CSS.' },
            { id: 'marketing', name: 'marketing', emoji: '🚀', prompt: 'Eres experto en Growth y SEO.' },
            { id: 'botmgr', name: 'bot-manager', emoji: '💬', prompt: 'Eres el gestor de bots de WhatsApp.' }
        ];

        let selectedAgent = AGENTS[0];
        let lastArtifact = null;

        function focusInput() { document.getElementById('prompt-input').focus(); }

        function handleInput(e) {
            const input = e.target;
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const cmd = input.value.trim();
                if (!cmd) return;
                
                input.value = '';
                executeCommand(cmd);
            }
        }

        async function executeCommand(content) {
            const history = document.getElementById('history');
            
            // Log user command
            history.innerHTML += `<div class="line"><span class="prompt">nexaops-ai ></span> ${content}</div>`;
            
            // Handle Local Commands
            if (content.startsWith('/')) {
                handleSlashCommand(content);
                return;
            }

            const apiKey = localStorage.getItem('openrouter_api_key');
            if (!apiKey) {
                log('error', 'Error: API Key de OpenRouter no encontrada. Usa /config [key] para establecerla.');
                return;
            }

            // Reasoning Animation
            const thoughtId = 'thought-' + Date.now();
            log('thought', `Thinking...`, thoughtId);
            
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                    },
                    body: JSON.stringify({
                        model: 'anthropic/claude-3.5-sonnet',
                        messages: [
                            { role: 'system', content: selectedAgent.prompt + ' Responde como una terminal de comando. Si generas HTML, usa bloques ```html.' },
                            { role: 'user', content: content }
                        ]
                    })
                });

                const data = await response.json();
                document.getElementById(thoughtId).remove();

                if (data.choices && data.choices[0]) {
                    const aiMsg = data.choices[0].message.content;
                    log('output', marked.parse(aiMsg));
                    extractArtifact(aiMsg);
                } else {
                    log('error', 'API Error: ' + JSON.stringify(data));
                }
            } catch (error) {
                document.getElementById(thoughtId)?.remove();
                log('error', 'Fatal: ' + error.message);
            }
            
            scrollToBottom();
        }

        function handleSlashCommand(content) {
            const parts = content.split(' ');
            const cmd = parts[0].toLowerCase();

            if (cmd === '/help') {
                log('system', 'Available commands:\n/agent [name] - Select AI specialist\n/config [key] - Set OpenRouter API Key\n/clear - Clear terminal\n/panel - Toggle artifacts panel\n/list - Show all agents');
            } else if (cmd === '/clear') {
                document.getElementById('history').innerHTML = '';
            } else if (cmd === '/config') {
                localStorage.setItem('openrouter_api_key', parts[1]);
                log('system', 'API Key updated successfully.');
            } else if (cmd === '/agent') {
                const name = parts[1];
                const agent = AGENTS.find(a => a.name === name);
                if (agent) {
                    selectedAgent = agent;
                    document.getElementById('current-prompt').innerText = `nexaops-ai (${agent.name}) >`;
                    log('system', `Switched to agent: ${agent.name}`);
                } else {
                    log('error', `Agent not found: ${name}`);
                }
            } else if (cmd === '/list') {
                log('system', 'Available agents: ' + AGENTS.map(a => a.name).join(', '));
            } else if (cmd === '/panel') {
                togglePanel();
            } else {
                log('error', `Unknown command: ${cmd}`);
            }
            scrollToBottom();
        }

        function log(type, content, id) {
            const history = document.getElementById('history');
            const div = document.createElement('div');
            div.className = `line ${type}`;
            if (id) div.id = id;
            div.innerHTML = content;
            history.appendChild(div);
        }

        function extractArtifact(text) {
            const match = text.match(/```html\n([\s\S]*?)```/);
            if (match) {
                lastArtifact = match[1];
                document.getElementById('artifacts-panel').style.display = 'flex';
                document.getElementById('preview-frame').srcdoc = lastArtifact;
            }
        }

        function togglePanel() {
            const p = document.getElementById('artifacts-panel');
            p.style.display = p.style.display === 'none' ? 'flex' : 'none';
        }

        function scrollToBottom() {
            const terminal = document.getElementById('terminal');
            terminal.scrollTop = terminal.scrollHeight;
        }

        function downloadArtifact() { if(!lastArtifact) return; const blob = new Blob([lastArtifact], {type: 'text/html'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'nexa_output.html'; a.click(); }
        function openFull() { if(!lastArtifact) return; const w = window.open(); w.document.write(lastArtifact); w.document.close(); }

        // Set initial prompt
        document.getElementById('current-prompt').innerText = `nexaops-ai (${selectedAgent.name}) >`;
    </script>
</body>
</html>
