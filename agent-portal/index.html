<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaOps AI - Agent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .agent-card { transition: all 0.2s; }
        .agent-card:hover { transform: translateY(-2px); }
        .chat-message { max-width: 80%; }
        .typing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-gray-950 text-white">
    <div class="flex h-screen">
        <!-- Sidebar: Agent List -->
        <aside class="w-80 bg-gray-900 border-r border-gray-800 flex flex-col">
            <div class="p-6 border-b border-gray-800">
                <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                    NexaOps Agents
                </h1>
                <p class="text-xs text-gray-500">Centro de comandos IA</p>
            </div>
            
            <div class="p-4">
                <input type="text" id="search-agents" placeholder="Buscar agente..." 
                    class="w-full px-4 py-2 rounded-xl bg-gray-800 border border-gray-700 text-sm"
                    oninput="filterAgents(this.value)">
            </div>
            
            <div id="agents-list" class="flex-1 overflow-y-auto p-4 space-y-2">
                <!-- Agents loaded by JS -->
            </div>
            
            <div class="p-4 border-t border-gray-800">
                <button onclick="showNewAgentModal()" class="w-full py-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm">
                    + Crear Agente
                </button>
            </div>
        </aside>
        
        <!-- Main: Chat Area -->
        <main class="flex-1 flex flex-col">
            <!-- Header -->
            <header id="chat-header" class="p-4 border-b border-gray-800 flex justify-between items-center">
                <div>
                    <h2 id="selected-agent-name" class="font-bold">Selecciona un agente</h2>
                    <p id="selected-agent-desc" class="text-sm text-gray-400"></p>
                </div>
                <div class="flex gap-2">
                    <button id="btn-run" onclick="runAgent()" disabled
                        class="px-4 py-2 rounded-lg bg-green-600 hover:bg-green-500 disabled:opacity-50 disabled:cursor-not-allowed">
                        ▶ Ejecutar
                    </button>
                    <button onclick="saveAgentConfig()" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600">
                        💾 Guardar
                    </button>
                </div>
            </header>
            
            <!-- Chat Messages -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="text-center text-gray-500 py-8">
                    <div class="text-6xl mb-4">🤖</div>
                    <p>Selecciona un agente y escribe tu prompt</p>
                </div>
            </div>
            
            <!-- Prompt Input -->
            <div class="p-4 border-t border-gray-800">
                <div class="flex gap-3">
                    <textarea id="prompt-input" rows="2" placeholder="Escribe tu prompt aquí..."
                        class="flex-1 px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 resize-none"
                        onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendPrompt(); }"></textarea>
                    <button onclick="sendPrompt()" class="px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500">
                        Enviar
                    </button>
                </div>
            </div>
        </main>
        
        <!-- Right: Agent Config -->
        <aside class="w-80 bg-gray-900 border-l border-gray-800 p-4 overflow-y-auto">
            <h3 class="font-bold mb-4">Configuración</h3>
            
            <div id="agent-config" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Nombre</label>
                    <input type="text" id="config-name" class="w-full px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm" disabled>
                </div>
                
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Descripción</label>
                    <textarea id="config-desc" rows="2" class="w-full px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Mode</label>
                    <select id="config-mode" class="w-full px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm">
                        <option value="primary">Primary</option>
                        <option value="subagent">Subagent</option>
                        <option value="all">All</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Tools</label>
                    <div id="config-tools" class="space-y-2 text-sm"></div>
                </div>
                
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Prompts Guardados</label>
                    <div id="saved-prompts" class="space-y-2"></div>
                </div>
            </div>
        </aside>
    </div>
    
    <!-- New Agent Modal -->
    <div id="new-agent-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-2xl p-8 w-full max-w-md border border-gray-700">
            <h3 class="text-xl font-bold mb-6">Crear Nuevo Agente</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Nombre</label>
                    <input type="text" id="new-agent-name" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700">
                </div>
<div>
                    <label class="block text-sm text-gray-400 mb-2">API del Sistema</label>
                    <input type="text" id="api-url" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700" placeholder="http://localhost:4000/api">
                </div>
                
                <div class="mt-4">
                    <label class="block text-sm text-gray-400 mb-2">OpenRouter API Key</label>
                    <input type="password" id="openrouter-key" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700" placeholder="sk-or-v1-..." onchange="saveApiKey()">
                </div>
                
                <div class="mt-4 p-4 rounded-lg bg-blue-500/20 border border-blue-500/50">
                    <p class="text-sm text-blue-300">💡 Usa tu API key de OpenRouter para ejecutar prompts automáticamente.</p>
                    <a href="https://openrouter.ai/keys" target="_blank" class="text-sm text-blue-400 underline">Obtener key gratis →</a>
                </div>
            </div>
        </div>
    </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Base</label>
                    <select id="new-agent-base" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700">
                        <option value="orchestrator">Orchestrator (base)</option>
                        <option value="python">Python Developer</option>
                        <option value="frontend">Frontend Developer</option>
                        <option value="automation">Automation Developer</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeNewAgentModal()" class="flex-1 py-3 rounded-xl bg-gray-700">Cancelar</button>
                <button onclick="createNewAgent()" class="flex-1 py-3 rounded-xl bg-indigo-600">Crear</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:4000/api';
        let agents = [];
        let selectedAgent = null;
        let chatHistory = [];
        
        const ALL_AGENTS = [
            { name: 'Orchestrator', file: 'orchestrator-agent.md', desc: 'Coordinador principal', category: 'core' },
            { name: 'Python Developer', file: 'python-developer.md', desc: 'Backend, APIs, data science', category: 'development' },
            { name: 'Frontend Dev', file: 'frontend-dev.md', desc: 'React, Vue, interfaces', category: 'development' },
            { name: 'Backend Dev', file: 'backend-dev.md', desc: 'APIs, microservices', category: 'development' },
            { name: 'Mobile Dev', file: 'mobile-developer.md', desc: 'iOS, Android, React Native', category: 'development' },
            { name: 'Desktop Dev', file: 'desktop-developer.md', desc: 'Electron, Tauri, PyQt', category: 'development' },
            { name: 'Debug Agent', file: 'debug-agent.md', desc: 'Bug fixing, performance', category: 'operations' },
            { name: 'Docs Writer', file: 'docs-writer.md', desc: 'Documentation', category: 'design' },
            { name: 'UI/UX Designer', file: 'ui-ux-designer.md', desc: 'User experience', category: 'design' },
            { name: 'Image Generator', file: 'image-generator.md', desc: 'Logos, banners, assets', category: 'design' },
            { name: 'Automation Dev', file: 'automation-developer.md', desc: 'Scripts, bots, scraping', category: 'automation' },
            { name: 'n8n Automation', file: 'n8n-automation.md', desc: 'Workflows para n8n', category: 'automation' },
            { name: 'SaaS Architect', file: 'saas-architect.md', desc: 'Cloud architecture', category: 'infrastructure' },
            { name: 'DevOps Engineer', file: 'devops-engineer.md', desc: 'CI/CD, Docker, K8s', category: 'infrastructure' },
            { name: 'Deploy Agent', file: 'deploy-agent.md', desc: 'Deploy websites', category: 'infrastructure' },
            { name: 'Digital Marketing', file: 'digital-marketing.md', desc: 'SEO, content, ads', category: 'business' },
            { name: 'Project Manager', file: 'project-manager.md', desc: 'Planning, Agile', category: 'business' },
            { name: 'NexaOps Team', file: 'nexaops-team.md', desc: 'Líder de equipo', category: 'core' },
        ];
        
        const TOOLS = ['bash', 'read', 'edit', 'glob', 'grep', 'webfetch', 'websearch', 'codesearch', 'task', 'todowrite', 'question'];
        
        document.addEventListener('DOMContentLoaded', () => {
            loadAgents();
            loadSavedAgents();
        });
        
        function loadAgents() {
            agents = ALL_AGENTS;
            displayAgents(agents);
        }
        
        function displayAgents(list) {
            document.getElementById('agents-list').innerHTML = list.map(a => `
                <button onclick="selectAgent('${a.name}')" 
                    class="agent-card w-full text-left px-4 py-3 rounded-xl bg-gray-800/50 hover:bg-gray-800 transition-all ${selectedAgent?.name === a.name ? 'border border-indigo-500' : 'border border-gray-700'}">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${getAgentEmoji(a.category)}</span>
                        <div>
                            <div class="font-medium">${a.name}</div>
                            <div class="text-xs text-gray-400">${a.desc}</div>
                        </div>
                    </div>
                </button>
            `).join('');
        }
        
        function getAgentEmoji(category) {
            return {
                core: '🎯',
                development: '💻',
                operations: '🔧',
                design: '🎨',
                automation: '⚡',
                infrastructure: '🏗️',
                business: '📈'
            }[category] || '🤖';
        }
        
        function filterAgents(query) {
            const filtered = agents.filter(a => 
                a.name.toLowerCase().includes(query.toLowerCase()) ||
                a.desc.toLowerCase().includes(query.toLowerCase())
            );
            displayAgents(filtered);
        }
        
        function selectAgent(name) {
            selectedAgent = agents.find(a => a.name === name);
            document.getElementById('selected-agent-name').textContent = selectedAgent.name;
            document.getElementById('selected-agent-desc').textContent = selectedAgent.desc;
            document.getElementById('btn-run').disabled = false;
            
            // Load config
            document.getElementById('config-name').value = selectedAgent.name;
            document.getElementById('config-desc').value = selectedAgent.desc;
            
            // Show chat area
            document.getElementById('chat-messages').innerHTML = `
                <div class="text-center text-gray-500 py-4">
                    <div class="text-4xl mb-2">${getAgentEmoji(selectedAgent.category)}</div>
                    <p>${selectedAgent.desc}</p>
                    <p class="text-xs mt-2">Archivo: ${selectedAgent.file}</p>
                </div>
            `;
            
            loadSavedPrompts(name);
            displayTools();
            
            // Update sidebar selection
            document.querySelectorAll('.agent-card').forEach(card => {
                card.classList.remove('border-indigo-500');
                card.classList.add('border-gray-700');
            });
        }
        
        function displayTools() {
            document.getElementById('config-tools').innerHTML = TOOLS.map(tool => `
                <label class="flex items-center gap-2">
                    <input type="checkbox" value="${tool}" checked class="rounded">
                    <span>${tool}</span>
                </label>
            `).join('');
        }
        
        async function loadSavedAgents() {
            try {
                const res = await fetch(`${API_URL}/agents`);
                if (res.ok) {
                    const data = await res.json();
                    // Merge saved config with default agents
                }
            } catch (e) {
                console.log('Using default agents');
            }
        }
        
        async function loadSavedPrompts(agentName) {
            try {
                const res = await fetch(`${API_URL}/agents/${encodeURIComponent(agentName)}/prompts`);
                if (res.ok) {
                    const prompts = await res.json();
                    document.getElementById('saved-prompts').innerHTML = prompts.map(p => `
                        <div class="p-2 rounded-lg bg-gray-800 text-sm cursor-pointer hover:bg-gray-700"
                            onclick="loadPrompt('${p.prompt}')">
                            <div class="truncate">${p.prompt}</div>
                            <div class="text-xs text-gray-500">${new Date(p.createdAt).toLocaleDateString()}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                document.getElementById('saved-prompts').innerHTML = '<p class="text-gray-500 text-sm">Sin prompts guardados</p>';
            }
        }
        
        function loadPrompt(prompt) {
            document.getElementById('prompt-input').value = prompt;
        }
        
        function sendPrompt() {
            const prompt = document.getElementById('prompt-input').value.trim();
            if (!prompt || !selectedAgent) return;
            
            // Add user message
            addMessage('user', prompt);
            document.getElementById('prompt-input').value = '';
            
            // Simulate agent response (in production, this calls Kilo CLI)
            addMessage('agent', `🤖 Ejecutando con ${selectedAgent.name}...\n\nPrompt guardado. Para ejecutar realmente, usa:\n\n\`\`\`bash\nkilo --agent ${selectedAgent.file.replace('.md', '')} "${prompt}"\n\`\`\``);
            
            // Save prompt to history
            chatHistory.push({ agent: selectedAgent.name, prompt, timestamp: new Date() });
        }
        
        function addMessage(role, content) {
            const messagesDiv = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `chat-message ${role === 'user' ? 'ml-auto bg-indigo-600' : 'bg-gray-800'} p-4 rounded-xl`;
            div.innerHTML = `<div class="text-sm">${content.replace(/\n/g, '<br>')}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        async function runAgent() {
            const prompt = document.getElementById('prompt-input').value.trim();
            if (!prompt || !selectedAgent) return;
            
            addMessage('agent', '⏳ Generando código con IA...');
            
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('openrouter_api_key')}`
                    },
                    body: JSON.stringify({
                        model: 'anthropic/claude-3-haiku-20240307',
                        messages: [{
                            role: 'user',
                            content: `Eres ${selectedAgent.name}. ${selectedAgent.desc}\n\nGenera código según este prompt: ${prompt}\n\nResponde SOLO con código listo para usar, sin explicaciones.`
                        }]
                    })
                });
                
                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    addMessage('agent', `✅ Código generado:\n\n${data.choices[0].message.content}`);
                } else {
                    addMessage('agent', '❌ Error. Configura tu API key de OpenRouter en Configuración.');
                }
            } catch (e) {
                addMessage('agent', `❌ Error de conexión.\n\nUsa Kilo CLI directamente:\n\n\`\`\`bash\nkilo --agent ${selectedAgent.file.replace('.md', '')} "${prompt}"\n\`\`\``);
            }
        }
        
        async function saveAgentConfig() {
            if (!selectedAgent) return;
            
            const config = {
                name: selectedAgent.name,
                file: selectedAgent.file,
                description: document.getElementById('config-desc').value,
                mode: document.getElementById('config-mode').value,
                tools: Array.from(document.querySelectorAll('#config-tools input:checked')).map(i => i.value)
            };
            
            try {
                await fetch(`${API_URL}/agents`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                alert('Configuración guardada');
            } catch (e) {
                // Save to localStorage as fallback
                localStorage.setItem(`agent_${selectedAgent.name}`, JSON.stringify(config));
                alert('Guardado localmente');
            }
        }
        
        function showNewAgentModal() {
            document.getElementById('new-agent-modal').classList.remove('hidden');
        }
        
        function closeNewAgentModal() {
            document.getElementById('new-agent-modal').classList.add('hidden');
        }
        
        function createNewAgent() {
            const name = document.getElementById('new-agent-name').value;
            const desc = document.getElementById('new-agent-desc').value;
            const base = document.getElementById('new-agent-base').value;
            
            if (!name) return alert('Nombre requerido');
            
            const newAgent = {
                name,
                file: `${name.toLowerCase().replace(/\s+/g, '-')}.md`,
                desc: desc || 'Nuevo agente',
                category: 'custom'
            };
            
            agents.push(newAgent);
            displayAgents(agents);
            closeNewAgentModal();
            selectAgent(name);
        }
    </script>
</body>
</html>
