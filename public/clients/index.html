<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaOps — Tu Proyecto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #050508; color: #f0f0f5; min-height: 100vh; overflow-x: hidden; }

        /* Ambient glows */
        .glow-1 { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%); top: -100px; left: -100px; pointer-events: none; z-index: 0; }
        .glow-2 { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%); bottom: 0; right: -100px; pointer-events: none; z-index: 0; }

        .wrapper { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }

        /* Header */
        .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
        .brand-logo { width: 36px; height: 36px; background: linear-gradient(135deg, #6366f1, #a78bfa); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .brand-name { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
        .brand-name span { color: #6366f1; }

        /* Welcome card */
        .welcome-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 24px; padding: 28px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .welcome-label { font-size: 12px; font-weight: 600; color: #6366f1; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .welcome-name { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
        .welcome-sub { font-size: 14px; color: #9ca3af; }

        /* Status badge */
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; margin-top: 14px; }
        .status-active { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
        .status-development { background: rgba(250,204,21,0.15); color: #facc15; border: 1px solid rgba(250,204,21,0.2); }
        .status-pending { background: rgba(156,163,175,0.15); color: #9ca3af; border: 1px solid rgba(156,163,175,0.2); }
        .status-review { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.2); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

        /* Section title */
        .section-title { font-size: 13px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.8px; margin: 28px 0 12px; }

        /* Project card */
        .project-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 24px; margin-bottom: 16px; }
        .project-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .project-desc { font-size: 13px; color: #9ca3af; margin-bottom: 20px; line-height: 1.5; }

        /* Progress */
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .progress-label { font-size: 12px; color: #9ca3af; }
        .progress-value { font-size: 22px; font-weight: 800; background: linear-gradient(to right, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.06); border-radius: 100px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(to right, #6366f1, #a78bfa); border-radius: 100px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); width: 0%; }

        /* Timeline / milestones */
        .timeline { position: relative; padding-left: 24px; }
        .timeline::before { content:''; position: absolute; left: 7px; top: 4px; bottom: 4px; width: 2px; background: rgba(99,102,241,0.2); border-radius: 2px; }
        .timeline-item { position: relative; margin-bottom: 20px; }
        .timeline-dot { position: absolute; left: -24px; top: 4px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #6366f1; background: #050508; }
        .timeline-dot.done { background: #6366f1; }
        .timeline-dot.active { background: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.2); animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0%,100%{box-shadow:0 0 0 4px rgba(99,102,241,0.2);} 50%{box-shadow:0 0 0 8px rgba(99,102,241,0.05);} }
        .timeline-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .timeline-sub { font-size: 12px; color: #6b7280; }

        /* No projects */
        .empty-state { text-align: center; padding: 40px 20px; color: #6b7280; }
        .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

        /* CTA / WhatsApp */
        .help-card { background: linear-gradient(135deg, rgba(37,211,102,0.1), rgba(37,211,102,0.03)); border: 1px solid rgba(37,211,102,0.2); border-radius: 20px; padding: 24px; margin-top: 28px; text-align: center; }
        .help-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .help-sub { font-size: 13px; color: #9ca3af; margin-bottom: 20px; }
        .wa-btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; background: #25d366; color: #fff; font-weight: 700; font-size: 15px; border-radius: 100px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(37,211,102,0.3); }
        .wa-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,211,102,0.4); }
        .wa-icon { width: 22px; height: 22px; }

        /* Footer */
        .footer { text-align: center; margin-top: 40px; font-size: 12px; color: #4b5563; }
        .footer span { color: #6366f1; }

        /* Loading / error */
        .loading { text-align: center; padding: 80px 20px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(99,102,241,0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-card { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 20px; padding: 32px; text-align: center; }

        /* Pulse animation on load */
        .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="wrapper">
        <div class="brand fade-in">
            <div class="brand-logo">⚡</div>
            <div class="brand-name">NexaOps<span>.</span></div>
        </div>

        <div id="app">
            <div class="loading">
                <div class="spinner"></div>
                <p style="color:#6b7280;font-size:14px;">Cargando tu proyecto...</p>
            </div>
        </div>

        <div class="footer fade-in" style="animation-delay:0.8s;">
            Powered by <span>NexaOps AI</span> — Automatización Inteligente
        </div>
    </div>

    <script>
        const API_URL = 'https://nexaops-ai.vercel.app/api';
        const WA_NUMBER = ''; // Se obtiene desde el localStorage del admin (no aplica aquí, se usa el de NexaOps)
        const NEXAOPS_WA = '584121146391'; // Soporte NexaOps Venezuela

        function getStatusConfig(status) {
            const map = {
                'active':       { label: 'Activo',          cls: 'status-active',      dot: 'done',   icon: '✅' },
                'Cliente Activo':{ label: 'Cliente Activo', cls: 'status-active',      dot: 'done',   icon: '✅' },
                'development':  { label: 'En Desarrollo',   cls: 'status-development', dot: 'active', icon: '🔨' },
                'review':       { label: 'En Revisión',     cls: 'status-review',      dot: 'active', icon: '🔍' },
                'pending':      { label: 'Pendiente',       cls: 'status-pending',     dot: '',       icon: '⏳' },
                'completed':    { label: 'Completado',      cls: 'status-active',      dot: 'done',   icon: '🎉' },
            };
            return map[status] || { label: status || 'N/A', cls: 'status-pending', dot: '', icon: '📋' };
        }

        function getMilestones(progress) {
            const steps = [
                { title: 'Proyecto iniciado',        pct: 0,   sub: 'Documentación y requisitos' },
                { title: 'Configuración inicial',    pct: 20,  sub: 'Entorno y credenciales listos' },
                { title: 'Desarrollo en progreso',   pct: 50,  sub: 'Construcción del núcleo' },
                { title: 'Pruebas y ajustes',        pct: 75,  sub: 'QA y refinamiento' },
                { title: 'Entrega y puesta en marcha', pct: 100, sub: 'Lanzamiento completo' },
            ];
            return steps.map(s => {
                let state = '';
                if (progress >= s.pct) state = s.pct < progress ? 'done' : 'active';
                else if (progress >= s.pct - 20) state = 'active';
                return { ...s, state };
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            return new Date(dateStr).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        async function loadClientData() {
            const params = new URLSearchParams(window.location.search);
            const clientId = params.get('id');

            if (!clientId) {
                renderError('No se encontró el enlace de tu proyecto. Contacta a NexaOps para obtener tu acceso.');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/client-view/${clientId}`);
                if (!res.ok) throw new Error('not found');
                const { client, projects } = await res.json();
                renderDashboard(client, projects);
            } catch (e) {
                renderError('No pudimos cargar tu información. Por favor, contacta a soporte.');
            }
        }

        function renderDashboard(client, projects) {
            const statusCfg = getStatusConfig(client.status);
            const projectsHTML = projects.length > 0 ? projects.map((p, i) => {
                const pStatus = getStatusConfig(p.status);
                const milestones = getMilestones(p.progress || 0);
                return `
                    <div class="project-card fade-in delay-${i + 2}">
                        <div class="project-name">${p.name}</div>
                        <p class="project-desc">${p.description || 'Automatización personalizada para tu negocio.'}</p>

                        <div class="progress-header">
                            <span class="progress-label">Progreso general</span>
                            <span class="progress-value">${p.progress || 0}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="fill-${p.id}" style="width:0%"></div>
                        </div>

                        <div class="section-title" style="margin-top:24px;">Hitos del proyecto</div>
                        <div class="timeline">
                            ${milestones.map(m => `
                                <div class="timeline-item">
                                    <div class="timeline-dot ${m.state}"></div>
                                    <div class="timeline-title">${m.title}</div>
                                    <div class="timeline-sub">${m.sub}</div>
                                </div>
                            `).join('')}
                        </div>

                        <div style="margin-top:16px;">
                            <span class="status-badge ${pStatus.cls}">
                                <span class="status-dot"></span>
                                ${pStatus.label}
                            </span>
                        </div>
                    </div>
                `;
            }).join('') : `
                <div class="empty-state fade-in delay-2">
                    <div class="empty-icon">🚀</div>
                    <p style="font-size:15px;font-weight:600;margin-bottom:6px;">Tu proyecto está siendo preparado</p>
                    <p style="font-size:13px;">Nuestro equipo te contactará muy pronto para comenzar.</p>
                </div>
            `;

            const waMessage = encodeURIComponent(
                `Hola NexaOps! Soy ${client.name} y tengo una pregunta sobre mi proyecto.`
            );
            const waLink = `https://wa.me/${NEXAOPS_WA}?text=${waMessage}`;

            document.getElementById('app').innerHTML = `
                <div class="welcome-card fade-in delay-1">
                    <div class="welcome-label">Tu espacio de proyecto</div>
                    <div class="welcome-name">Hola, ${client.name} 👋</div>
                    <div class="welcome-sub">Aquí puedes seguir el estado de tu automatización en tiempo real.</div>
                    <span class="status-badge ${statusCfg.cls}">
                        <span class="status-dot"></span>
                        ${statusCfg.label}
                    </span>
                </div>

                <div class="section-title">Tus proyectos</div>
                ${projectsHTML}

                <div class="help-card fade-in delay-3">
                    <div class="help-title">¿Tienes alguna pregunta?</div>
                    <div class="help-sub">Nuestro equipo está disponible para ayudarte directamente por WhatsApp.</div>
                    <a href="${waLink}" target="_blank" class="wa-btn">
                        <svg class="wa-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                        </svg>
                        Contactar por WhatsApp
                    </a>
                </div>
            `;

            // Animate progress bars after render
            setTimeout(() => {
                projects.forEach(p => {
                    const fill = document.getElementById(`fill-${p.id}`);
                    if (fill) fill.style.width = `${p.progress || 0}%`;
                });
            }, 100);
        }

        function renderError(msg) {
            document.getElementById('app').innerHTML = `
                <div class="error-card fade-in">
                    <div style="font-size:36px;margin-bottom:12px;">🔍</div>
                    <p style="font-size:16px;font-weight:700;margin-bottom:8px;">No encontramos tu proyecto</p>
                    <p style="font-size:13px;color:#9ca3af;">${msg}</p>
                </div>
            `;
        }

        loadClientData();
    </script>
</body>
</html>
