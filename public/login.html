<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaOps AI | Acceso Restringido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050508; color: #fff; }
        .glass-card { background: rgba(15, 15, 19, 0.8); border: 1px solid #1e1e26; backdrop-filter: blur(10px); }
        .neon-glow { text-shadow: 0 0 10px #d4ff00; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="glass-card p-10 rounded-[2.5rem] w-full max-w-md border-nexa-neon/20 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-nexa-neon/10 rounded-full blur-3xl"></div>
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-nexa-neon rounded-2xl flex items-center justify-center text-black font-black text-2xl mx-auto mb-4 shadow-lg shadow-nexa-neon/20">N</div>
            <h1 class="text-2xl font-black tracking-tighter">NexaOps<span class="text-nexa-neon">.</span> AI</h1>
            <p class="text-gray-500 text-xs mt-2 uppercase tracking-widest font-bold">Terminal de Acceso Privado</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2 ml-1">Master Key</label>
                <input type="password" id="master-key" required class="w-full bg-[#0b0b0f] border border-[#1e1e26] rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-nexa-neon transition" placeholder="••••••••••••">
            </div>
            <button type="submit" class="w-full py-4 bg-nexa-neon text-black rounded-2xl font-black text-sm uppercase tracking-tighter hover:scale-[1.02] active:scale-95 transition shadow-lg shadow-nexa-neon/20">
                Iniciar Sesión Encriptada
            </button>
        </form>
        
        <p id="error-msg" class="text-red-500 text-[10px] text-center mt-4 font-bold uppercase hidden">Acceso Denegado: Clave Incorrecta</p>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const key = document.getElementById('master-key').value;
            
            // For a "One Person Company", we can use a hardcoded key initially or an Env Var comparison if we had a proper backend auth.
            // But to make it "exclusive", we set a token that the other pages will check.
            if (key === 'nexa2026') { // This is a temporary key, we can change it.
                localStorage.setItem('nexa_session', 'active_' + Date.now());
                window.location.href = '/admin/portal.html';
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
                setTimeout(() => document.getElementById('error-msg').classList.add('hidden'), 3000);
            }
        };
    </script>
</body>
</html>
